name: Continuous Deployment

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish-github:
    name: Publish on GitHub
    runs-on: ${{ matrix.config.OS }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { OS: ubuntu-latest, TARGET: "x86_64-unknown-linux-gnu" }
          - { OS: ubuntu-latest, TARGET: "x86_64-unknown-linux-musl" }
          - { OS: ubuntu-latest, TARGET: "i686-unknown-linux-gnu" }
          - { OS: ubuntu-latest, TARGET: "i686-unknown-linux-musl" }
          - { OS: ubuntu-latest, TARGET: "armv5te-unknown-linux-gnueabi" }
          - { OS: ubuntu-latest, TARGET: "armv7-unknown-linux-gnueabihf" }
          - { OS: ubuntu-latest, TARGET: "aarch64-unknown-linux-gnu" }
          - { OS: ubuntu-latest, TARGET: "aarch64-unknown-linux-musl" }
          - { OS: macos-latest, TARGET: "x86_64-apple-darwin" }
          - { OS: macos-latest, TARGET: "aarch64-apple-darwin" }
          - { OS: windows-latest, TARGET: "x86_64-pc-windows-msvc" }
          - { OS: windows-latest, TARGET: "i686-pc-windows-msvc" }

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3

      - name: Set the release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF:11}" >> $GITHUB_ENV

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.config.TARGET }}
          override: true

      - name: Build
        uses: actions-rs/cargo@v1
        with:
          use-cross: true
          command: build
          args: --release --locked --target ${{ matrix.config.TARGET }}

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir release
          cp LICENSE README.md release/

          if [[ "${{ matrix.config.OS }}" == "windows-latest" ]]; then
            cp target/${{ matrix.config.TARGET }}/release/hxn.exe release/
          else
            cp target/${{ matrix.config.TARGET }}/release/hxn release/
          fi

          mv release haylxon-${{ env.RELEASE_VERSION }}

      - name: Create release artifacts
        shell: bash
        run: |
          if [[ "${{ matrix.config.OS }}" == "windows-latest" ]]; then
            7z a -tzip "haylxon-${{ env.RELEASE_VERSION }}-${{ matrix.config.TARGET }}.zip" \
              haylxon-${{ env.RELEASE_VERSION }}
          else
            tar -czvf "haylxon-${{ env.RELEASE_VERSION }}-${{ matrix.config.TARGET }}.tar.gz" \
              haylxon-${{ env.RELEASE_VERSION }}/
            shasum -a 512 "haylxon-${{ env.RELEASE_VERSION }}-${{ matrix.config.TARGET }}.tar.gz" \
              > "haylxon-${{ env.RELEASE_VERSION }}-${{ matrix.config.TARGET }}.tar.gz.sha512"
          fi

      - name: Upload the release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: haylxon-${{ env.RELEASE_VERSION }}-${{ matrix.config.TARGET }}.*
          file_glob: true
          overwrite: true
          tag: ${{ github.ref }}

  update-release-body:
    name: Update release body with download table
    needs: publish-github
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set the release version
        run: echo "RELEASE_VERSION=${GITHUB_REF:11}" >> $GITHUB_ENV

      - name: Generate release body with download table
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ env.RELEASE_VERSION }}"

          # Fetch all release assets
          ASSETS=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets -q '.assets[].name')

          # Build the markdown table
          BODY="## Installation

          \`\`\`sh
          cargo install hxn --locked
          \`\`\`

          Or download a prebuilt binary below.

          ## Download

          | Target | Binary | SHA-512 |
          |--------|--------|---------|"

          # Unix targets (tar.gz + sha512)
          for TARGET in \
            x86_64-unknown-linux-gnu x86_64-unknown-linux-musl \
            i686-unknown-linux-gnu i686-unknown-linux-musl \
            armv5te-unknown-linux-gnueabi armv7-unknown-linux-gnueabihf \
            aarch64-unknown-linux-gnu aarch64-unknown-linux-musl \
            x86_64-apple-darwin aarch64-apple-darwin; do

            TARBALL="haylxon-${VERSION}-${TARGET}.tar.gz"
            SHA_FILE="haylxon-${VERSION}-${TARGET}.tar.gz.sha512"
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${TARBALL}"
            SHA_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${SHA_FILE}"

            if echo "$ASSETS" | grep -q "^${TARBALL}$"; then
              BODY="${BODY}
          | \`${TARGET}\` | [${TARBALL}](${DOWNLOAD_URL}) | [checksum](${SHA_URL}) |"
            fi
          done

          # Windows targets (zip, no sha)
          for TARGET in x86_64-pc-windows-msvc i686-pc-windows-msvc; do
            ZIPFILE="haylxon-${VERSION}-${TARGET}.zip"
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIPFILE}"

            if echo "$ASSETS" | grep -q "^${ZIPFILE}$"; then
              BODY="${BODY}
          | \`${TARGET}\` | [${ZIPFILE}](${DOWNLOAD_URL}) | — |"
            fi
          done

          # Strip leading whitespace from each line (caused by YAML indentation)
          BODY=$(echo "$BODY" | sed 's/^          //')

          # Update the release body
          gh release edit "$TAG" --repo "${{ github.repository }}" --notes "$BODY"

  publish-crates-io:
    name: Publish on crates.io
    needs: publish-github
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: cargo publish --locked
